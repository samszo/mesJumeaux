<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mes Jumeaux de Naissance</title>
  <script src="assets/wikidata-sdk.min.js"></script>
  <script src="assets/d3.v7.min.js"></script>
  <script src="assets/cal-heatmap.min.js"></script>
  <script src="assets/popper.min.js"></script>
  <script src="assets/Tooltip.min.js"></script>
  <link rel="stylesheet" href="assets/cal-heatmap.css">
  <link rel="stylesheet" href="assets/main.css">
</head>
<body>

<div id="top-bar">
<header>
  <h1>Mes Jumeaux de Naissance</h1>
  <p>Découvrez les personnalités nées le même jour que vous</p>
  <div class="header-actions">
    <button class="btn-archives" onclick="toggleSelections()">⭐ Sélections</button>
  </div>
</header>

<div class="search-section">
  <div class="date-inputs">
    <div class="field">
      <label>Jour</label>
      <input type="number" id="day" min="1" max="31" value="17" style="width:80px">
    </div>
    <div class="field">
      <label>Mois</label>
      <select id="month">
        <option value="1">Janvier</option>
        <option value="2">Février</option>
        <option value="3">Mars</option>
        <option value="4">Avril</option>
        <option value="5">Mai</option>
        <option value="6" selected>Juin</option>
        <option value="7">Juillet</option>
        <option value="8">Août</option>
        <option value="9">Septembre</option>
        <option value="10">Octobre</option>
        <option value="11">Novembre</option>
        <option value="12">Décembre</option>
      </select>
    </div>
    <div class="field">
      <label>&nbsp;</label>
      <button class="btn-search" id="searchBtn" onclick="search()">Rechercher</button>
    </div>
  </div>
  <div class="limit-field">
    <label>Année de départ :</label>
    <input type="number" id="startYear" value="2020" min="1000" max="2100" style="width:90px">
    <label style="margin-left:0.5rem">Jusqu'en :</label>
    <input type="number" id="endYear" value="1000" min="1000" max="2100" style="width:90px">
  </div>

</div>
<div id="load-count" style="display:none;text-align:center;color:#64748b;font-size:0.85rem;margin:0.5rem 0"></div>
<div id="status"></div>
<div id="stop-bar" style="display:none;text-align:center;margin-bottom:1rem">
  <button class="btn-stop" onclick="stopSearch()">⏹ Arrêter</button>
</div>
  <div class="heatmap-header">
    <span id="heatmap-label"></span>
    <div id="img-progress" class="img-progress-inline hidden">
      <span id="img-progress-label" class="img-progress-label-inline"></span>
      <div class="img-progress-bar-wrap-inline">
        <div id="img-progress-bar" class="img-progress-bar-inline"></div>
      </div>
      <span id="img-progress-timer" class="img-progress-timer-inline"></span>
      <button class="btn-heatmap-nav" onclick="imageRateLimiter.cancel()">✕</button>
    </div>
    <div class="heatmap-nav" style="display: none;">
      <button class="btn-heatmap-nav" onclick="calHeatmapPrev()">← Précédent</button>
      <button class="btn-heatmap-nav" onclick="calHeatmapNext()">Suivant →</button>
    </div>
  </div>

</div><!-- /#top-bar -->

<div id="timeline"></div>

<div id="results"></div>
<!-- Section affichage d'une sélection chargée -->
<div id="selection-view" class="hidden">
  <div class="selection-view-header">
    <div>
      <div id="selection-view-title" class="selection-view-title"></div>
      <div id="selection-view-meta" class="selection-view-meta"></div>
    </div>
    <button class="btn-sel-clear" onclick="closeSelectionView()">✕ Fermer</button>
  </div>
  <div id="selection-view-grid" class="grid"></div>
</div>

<!-- Menu sélections -->
<div id="selections-panel" class="archives-panel hidden">
  <div class="archives-header">
    <span>⭐ Sélections enregistrées</span>
    <button onclick="toggleSelections()">✕</button>
  </div>
  <ul id="selections-list" style="list-style-type: none;"><li style="color:#475569;padding:0.5rem 0.8rem;font-size:0.85rem">Chargement…</li></ul>
</div>

<!-- Menu flottant années -->
<nav id="year-nav" class="year-nav hidden">
  <div class="year-nav-header">
    <span>Stats</span>
    <button class="year-nav-close" onclick="toggleNav()">✕</button>
  </div>
  <ul id="year-nav-list"></ul>

<div id="heatmap-section">
  <div id="cal-heatmap"></div>
</div>
<div id="stats" class="stats-section hidden"></div>
<div id="tooltip"></div>

</nav>
<button id="nav-toggle" class="nav-toggle" onclick="toggleNav()" title="Navigation par année">☰</button>

<!-- Modal titre/auteur pour la sauvegarde de sélection -->
<div id="save-selection-modal" class="modal-overlay hidden">
  <div class="modal-box">
    <h3>Enregistrer la sélection</h3>
    <label class="modal-label">Titre
      <input id="sel-title" type="text" class="modal-input" placeholder="Ma sélection de jumeaux…">
    </label>
    <label class="modal-label">Auteur
      <input id="sel-author" type="text" class="modal-input" placeholder="Prénom Nom">
    </label>
    <div class="modal-actions">
      <button class="btn-sel-export" onclick="confirmSaveSelection()">Enregistrer</button>
      <button class="btn-sel-clear" onclick="document.getElementById('save-selection-modal').classList.add('hidden')">Annuler</button>
    </div>
  </div>
</div>


<!-- Barre de sélection flottante -->
<div id="selection-bar" class="selection-bar hidden">
  <span id="selection-count"></span>
  <div class="selection-actions">
    <button class="btn-sel-export" onclick="exportSelectionCsv()">CSV</button>
    <button class="btn-sel-export" onclick="exportSelectionJson()">JSON</button>
    <button class="btn-sel-export" onclick="exportSelectionQmd()">QMD</button>
    <button class="btn-sel-export" onclick="exportSelectionHtml()">HTML</button>
    <button class="btn-sel-clear" onclick="selection.clear()">✕ Tout désélectionner</button>
  </div>
</div>


<script>
  const MONTHS = ['','Janvier','Février','Mars','Avril','Mai','Juin',
    'Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
  const tooltip = d3.select("#tooltip")

  // ── Rate-limiter images avec progression ─────────────────────────────────
  const imageRateLimiter = {
    BATCH_SIZE: 50,
    INTERVAL: 10000,
    queue: [],
    timer: null,
    _total: 0,
    _done: 0,
    _cancelled: false,
    _countdownTimer: null,

    enqueue(entityId, imgEl) {
      if (!imgEl || imgEl.dataset.queued) return;
      imgEl.dataset.queued = '1';
      this.queue.push({ entityId, imgEl });
      this._total++;
      if (!this.timer) {
        this._cancelled = false;
        this._showModal();
        this._next();
      } else {
        this._updateModal();
      }
    },

    cancel() {
      this._cancelled = true;
      clearTimeout(this.timer);
      clearInterval(this._countdownTimer);
      this.timer = null;
      this.queue = [];
      this._total = 0;
      this._done = 0;
      this._hideModal();
    },

    _next() {
      if (this._cancelled || !this.queue.length) {
        this.timer = null;
        if (!this._cancelled) this._hideModal();
        return;
      }
      this.timer = -1;
      const batch = this.queue.splice(0, this.BATCH_SIZE);
      this._updateModal();
      getP18ImageBatch(batch.map(b => b.entityId)).then(urlMap => {
        for (const { entityId, imgEl } of batch) {
          const url = urlMap[entityId];
          if (url && imgEl) { imgEl.src = url; imgEl.onload = () => imgEl.classList.add('loaded'); }
        }
        this._done += batch.length;
        this._updateModal();
      }).finally(() => {
        if (this._cancelled) return;
        if (!this.queue.length) { this.timer = null; this._hideModal(); return; }
        this._startCountdown();
        this.timer = setTimeout(() => {
          clearInterval(this._countdownTimer);
          this._next();
        }, this.INTERVAL);
      });
    },

    _startCountdown() {
      let remaining = Math.ceil(this.INTERVAL / 1000);
      document.getElementById('img-progress-timer').textContent =
        `Prochain batch dans ${remaining}s`;
      clearInterval(this._countdownTimer);
      this._countdownTimer = setInterval(() => {
        remaining--;
        if (remaining <= 0) { clearInterval(this._countdownTimer); return; }
        document.getElementById('img-progress-timer').textContent =
          `Prochain batch dans ${remaining}s`;
      }, 1000);
    },

    _showModal() {
      this._done = 0;
      this._total = this.queue.length;
      document.getElementById('img-progress').classList.remove('hidden');
      this._updateModal();
    },

    _hideModal() {
      document.getElementById('img-progress').classList.add('hidden');
      document.getElementById('img-progress-timer').textContent = '';
      this._total = 0;
      this._done  = 0;
    },

    _updateModal() {
      const pct       = this._total ? Math.round(this._done / this._total * 100) : 0;
      const remaining = this._total - this._done;
      document.getElementById('img-progress-bar').style.width = pct + '%';
      document.getElementById('img-progress-label').textContent =
        `🖼 ${this._done}/${this._total}${remaining ? ` (${remaining} restantes)` : ''}`;
    },

    prioritize(entityIds) {
      const ids = new Set(entityIds);
      const priority = this.queue.filter(e => ids.has(e.entityId));
      const rest     = this.queue.filter(e => !ids.has(e.entityId));
      this.queue = [...priority, ...rest];
    },

    get pending() { return this.queue.length; },
  };

  let state = {
    running: false, allResults: [],
    day: 17, month: 6, startYear: 2025, endYear: 1800,
  };

  // ── Sélection d'items ────────────────────────────────────────────────────
  const selection = {
    _map: new Map(), // qid → item data
    add(qid, data) {
      this._map.set(qid, data);
      this._update();
    },
    remove(qid) {
      this._map.delete(qid);
      this._update();
    },
    clear() {
      this._map.clear();
      document.querySelectorAll('.card-checkbox:checked').forEach(cb => {
        cb.checked = false;
        cb.closest('.card')?.classList.remove('card-selected');
      });
      this._update();
    },
    get size() { return this._map.size; },
    get items() { return [...this._map.values()]; },
    _update() {
      const bar   = document.getElementById('selection-bar');
      const count = document.getElementById('selection-count');
      if (this._map.size > 0) {
        bar.classList.remove('hidden');
        count.textContent = `${this._map.size} item${this._map.size > 1 ? 's' : ''} sélectionné${this._map.size > 1 ? 's' : ''}`;
      } else {
        bar.classList.add('hidden');
      }
    },
  };

  function pad(n) { return String(n).padStart(2, '0'); }

  async function localFetch(day, month) {
    const response = await fetch(`local-query.php?day=${day}&month=${month}`);
    state.cache = response.headers.get('x-cache') === 'HIT';
    if (!response.ok) throw new Error(`Erreur HTTP ${response.status}`);
    return response.json();
  }

  async function search() {
    const day       = parseInt(document.getElementById('day').value);
    const month     = parseInt(document.getElementById('month').value);
    const startYear = parseInt(document.getElementById('startYear').value);
    const endYear   = parseInt(document.getElementById('endYear').value);

    if (!day || day < 1 || day > 31) {
      showStatus('error', 'Veuillez saisir un jour valide (1–31).');
      return;
    }

    state.running     = true;
    state.allResults  = [];
    state.day         = day;
    state.month       = month;
    state.startYear   = startYear;
    state.endYear     = endYear;
    document.getElementById('searchBtn').disabled = true;
    document.getElementById('stop-bar').style.display = 'block';
    document.getElementById('results').innerHTML = '';
    document.getElementById('heatmap-section').style.display = 'none';
    document.getElementById('timeline').style.display = 'none';
    document.getElementById('timeline').innerHTML = '';
    document.getElementById('year-nav-list').innerHTML = '';

    showStatus('loading', `Interrogation de la base locale…`);

    try {
      const allRows = await localFetch(day, month);

      // Groupe par année, filtre selon startYear/endYear
      const byYear = {};
      for (const r of allRows) {
        const y = r.year;
        if (!y || y > startYear || y < endYear) continue;
        if (!byYear[y]) byYear[y] = [];
        byYear[y].push(r);
      }

      // Affiche du plus récent au plus ancien
      const years = Object.keys(byYear).map(Number).sort((a, b) => b - a);
      for (const year of years) {
        if (!state.running) break;
        appendYearSection(year, day, month, byYear[year]);
      }

      if (!years.length) showStatus('info', 'Aucun résultat pour cette date.');
    } catch (err) {
      showStatus('error', `Erreur : ${err.message}`);
    }

    finishSearch();
  }

  function appendYearSection(year, day, month, results) {
    const container = document.getElementById('results');

    const section = document.createElement('div');
    section.className = 'year-section';
    section.id = `year-${year}`;

    const heading = document.createElement('div');
    heading.className = 'year-heading';
    heading.innerHTML = `${year}
      <span class="year-count">${results.length} personnalité${results.length > 1 ? 's' : ''}</span>
      <button class="btn-year-img" data-year="${year}" title="Charger les images de cette année en priorité">🖼</button>`;
    heading.querySelector('.btn-year-img').addEventListener('click', () => {
      const ids = results.map(r => r.item.value).filter(Boolean);
      imageRateLimiter.prioritize(ids);
      heading.querySelector('.btn-year-img').disabled = true;
    });
    section.appendChild(heading);

    const grid = document.createElement('div');
    grid.className = 'grid';

    for (const r of results) {
      const name        = r.item.label    || '(sans nom)';
      const desc        = r.item.description || '';
      const article     = r.articlename  || '';
      const wikidataUrl = r.item.value ? `https://www.wikidata.org/wiki/${r.item.value}` : '#';
      const wpUrl       = r.wikilang ? `https://${r.wikilang}.wikipedia.org/wiki/${encodeURIComponent(article)}` : null;

      const qid = r.item.value || '';
      const card = document.createElement('div');
      card.className = 'card';
      card.dataset.qid = qid;
      card.innerHTML = `
        <label class="card-select" title="Sélectionner">
          <input type="checkbox" class="card-checkbox" data-qid="${escapeHtml(qid)}">
        </label>
        <div class="card-name">${escapeHtml(name)}</div>
        ${desc ? `<div class="card-desc">${escapeHtml(desc)}</div>` : ''}
        <img id="${qid}-img" />
        <div style="margin-top:auto;display:flex;gap:0.6rem;flex-wrap:wrap">
          ${wpUrl ? `<a class="card-link" href="${escapeHtml(wpUrl)}" target="_blank" rel="noopener">Wikipedia →</a>` : ''}
          <a class="card-link" href="${escapeHtml(wikidataUrl)}" target="_blank" rel="noopener">Wikidata →</a>
        </div>`;
      card.querySelector('.card-checkbox').addEventListener('change', e => {
        const qid = e.target.dataset.qid;
        if (e.target.checked) {
          card.classList.add('card-selected');
          selection.add(qid, { year, name, desc, article, wikidataUrl, wpUrl, qid });
        } else {
          card.classList.remove('card-selected');
          selection.remove(qid);
        }
      });
      grid.appendChild(card);
    }

    section.appendChild(grid);
    container.appendChild(section);

    // Scroll jusqu'à la section de l'année courante
    section.scrollIntoView({ behavior: 'smooth', block: 'start' });

    state.allResults.push({ year, items: results });
    addNavEntry(year, 'has-results', results.length);

    for (const r of results) {
      const imgEl = document.getElementById(r.item.value + '-img');
      if (imgEl) imageRateLimiter.enqueue(r.item.value, imgEl);
    }
  }

  // Fetch P18 (image) for a batch of entity IDs; returns { entityId: url|null }
  async function getP18ImageBatch(entityIds) {
    const result = Object.fromEntries(entityIds.map(id => [id, null]));
    try {
      const ids  = entityIds.join('|');
      const url  = `https://www.wikidata.org/w/api.php?action=wbgetentities`
                  + `&ids=${ids}&props=claims&format=json&origin=*`;
      const r    = await fetch(url);
      const data = await r.json();
      for (const entityId of entityIds) {
        const p18 = data.entities?.[entityId]?.claims?.P18 ?? [];
        if (!p18.length) continue;
        const filename = p18[0].mainsnak?.datavalue?.value;
        if (!filename) continue;
        const encoded = encodeURIComponent(filename.replace(/ /g, '_'));
        result[entityId] = `https://commons.wikimedia.org/w/index.php`
                         + `?title=Special:Redirect/file/${encoded}&width=120`;
      }
    } catch { /* silently ignore network errors */ }
    return result;
  }

  function appendEmptyYear(year) {
    const container = document.getElementById('results');
    const section = document.createElement('div');
    section.className = 'year-section';
    section.id = `year-${year}`;
    section.innerHTML = `
      <div class="year-heading">${year} <span class="year-count">aucun résultat</span></div>
      <p style="color:#475569;font-size:0.85rem;font-style:italic">Pas de personne née à cette date.</p>`;
    container.appendChild(section);
    section.scrollIntoView({ behavior: 'smooth', block: 'start' });
    addNavEntry(year, 'is-empty');
  }

  function addNavEntry(year, type, count) {
    return false;
    const list = document.getElementById('year-nav-list');
    const existing = document.getElementById(`nav-${year}`);
    if (existing) { existing.remove(); }

    const dot = type === 'has-results' ? '●' : type === 'has-error' ? '✕' : '○';
    const label = type === 'has-results' ? `${year} (${count})` : `${year}`;
    const li = document.createElement('li');
    li.className = `nav-year-item ${type}`;
    li.id = `nav-${year}`;
    li.innerHTML = `<a href="#year-${year}" onclick="document.getElementById('year-${year}')?.scrollIntoView({behavior:'smooth',block:'start'});return false;">
      <span class="nav-dot">${dot}</span>${label}</a>`;
    list.appendChild(li);
  }

  function updateNavEntry(year, type) {
    const li = document.getElementById(`nav-${year}`);
    if (!li) return;
    li.className = `nav-year-item ${type}`;
  }

  // ── Timeline ─────────────────────────────────────────────────────────────
  function renderTimeline() {
    const tl = document.getElementById('timeline');
    tl.style.display = 'block';
    tl.innerHTML = '';
    document.getElementById('results').innerHTML = '';

    const { allResults } = state;
    const totalPersons = allResults.reduce((s, r) => s + r.items.length, 0);
    const maxCount     = Math.max(...allResults.map(r => r.items.length), 1);

    const hdr = document.createElement('div');
    hdr.className = 'tl-header';
    hdr.innerHTML = `<span>${allResults.length} années · ${totalPersons} personnalités</span>
      <span>Cliquez sur une année pour afficher les personnalités</span>`;
    tl.appendChild(hdr);

    for (const { year, items } of allResults) {
      const row = document.createElement('div');
      row.id        = `tl-${year}`;
      row.className = 'tl-row' + (items.length ? ' clickable' : '');
      const pct = items.length ? Math.max(1, Math.round(items.length / maxCount * 100)) : 0;
      row.innerHTML = `
        <span class="tl-year">${year}</span>
        <div class="tl-bar-wrap">
          ${items.length
            ? `<div class="tl-bar" style="width:${pct}%"><span class="tl-count">${items.length}</span></div>`
            : `<span class="tl-empty">aucun résultat</span>`}
        </div>`;
      if (items.length) row.onclick = () => showYearFromTimeline(year);
      tl.appendChild(row);
    }
  }

  function updateTimelineRow(year) {
    const row = document.getElementById(`tl-${year}`);
    if (!row) return;
    const entry = state.allResults.find(r => r.year === year);
    if (!entry) return;
    const maxCount = Math.max(...state.allResults.map(r => r.items.length), 1);
    const pct      = Math.max(1, Math.round(entry.items.length / maxCount * 100));
    row.className  = 'tl-row clickable';
    row.innerHTML  = `
      <span class="tl-year">${year}</span>
      <div class="tl-bar-wrap">
        <div class="tl-bar" style="width:${pct}%"><span class="tl-count">${entry.items.length}</span></div>
        <span class="tl-rendered">✓ affiché</span>
      </div>`;
    row.onclick = () => showYearFromTimeline(year);
  }

  function showYearFromTimeline(year) {
    // Retirer le focus des autres lignes
    document.querySelectorAll('.tl-row.tl-active').forEach(r => r.classList.remove('tl-active'));
    const row = document.getElementById(`tl-${year}`);
    if (row) row.classList.add('tl-active');

    // Si la section est déjà rendue, juste scroller
    const existing = document.getElementById(`year-${year}`);
    if (existing) {
      existing.scrollIntoView({ behavior: 'smooth', block: 'start' });
      return;
    }

    // Rendre la section
    const entry = state.allResults.find(r => r.year === year);
    if (!entry) return;
    if (entry.items.length) {
      appendYearSection(year, state.day, state.month, entry.items);
    } else {
      const container = document.getElementById('results');
      const section = document.createElement('div');
      section.className = 'year-section';
      section.id = `year-${year}`;
      section.innerHTML = `
        <div class="year-heading">${year} <span class="year-count">aucun résultat</span></div>
        <p style="color:#475569;font-size:0.85rem;font-style:italic">Pas de personne née à cette date.</p>`;
      container.appendChild(section);
      section.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    // Marquer comme affiché dans la timeline
    if (row) {
      const rendered = document.createElement('span');
      rendered.className = 'tl-rendered';
      rendered.textContent = '✓ affiché';
      row.querySelector('.tl-bar-wrap')?.appendChild(rendered);
    }
  }

  function toggleNav() {
    document.getElementById('year-nav').classList.toggle('hidden');
  }

  function stopSearch() {
    state.running = false;
  }

  function finishSearch() {
    state.running = false;
    document.getElementById('searchBtn').disabled = false;
    document.getElementById('stop-bar').style.display = 'none';
    clearStatus();
    renderCalHeatmap();
    renderStats();
  }

  function renderStats() {
    const { allResults, day, month, startYear, endYear } = state;
    const el = document.getElementById('stats');
    if (!allResults.length) { el.classList.add('hidden'); return; }

    const total      = allResults.reduce((s, r) => s + r.items.length, 0);
    const yearsWithResults = allResults.filter(r => r.items.length > 0);
    const yearsEmpty = allResults.length - yearsWithResults.length;
    const avg        = yearsWithResults.length ? (total / yearsWithResults.length).toFixed(1) : 0;
    const peak       = allResults.reduce((best, r) => r.items.length > best.items.length ? r : best, allResults[0]);
    const byDesc     = [...allResults].sort((a, b) => b.items.length - a.items.length).slice(0, 5);
    const dateLabel  = `${String(day).padStart(2,'0')}/${String(month).padStart(2,'0')}`;

    el.innerHTML = `
      <div class="stats-title">📊 Statistiques — ${dateLabel} · ${startYear}→${endYear}</div>
      <div class="stats-grid">
        <div class="stats-card">
          <div class="stats-value">${total}</div>
          <div class="stats-label">personnalités au total</div>
        </div>
        <div class="stats-card">
          <div class="stats-value">${allResults.length}</div>
          <div class="stats-label">années analysées</div>
        </div>
        <div class="stats-card">
          <div class="stats-value">${avg}</div>
          <div class="stats-label">personnalités / an (moyenne)</div>
        </div>
        <div class="stats-card">
          <div class="stats-value">${yearsEmpty}</div>
          <div class="stats-label">années sans résultat</div>
        </div>
      </div>
      <div class="stats-peak">
        🏆 Année la plus riche : <strong>${peak.year}</strong> avec <strong>${peak.items.length}</strong> personnalité${peak.items.length > 1 ? 's' : ''}
      </div>
      <div class="stats-top">
        <div class="stats-top-title">Top 5 années</div>
        ${byDesc.map(r => `
          <div class="stats-top-row">
            <span class="stats-top-year">${r.year}</span>
            <div class="stats-top-bar-wrap">
              <div class="stats-top-bar" style="width:${Math.round(r.items.length / peak.items.length * 100)}%"></div>
            </div>
            <span class="stats-top-count">${r.items.length}</span>
          </div>`).join('')}
      </div>`;
    el.classList.remove('hidden');
    el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function showStatus(type, msg) {
    const el = document.getElementById('status');
    if (type === 'loading') {
      el.innerHTML = `<span class="spinner"></span><span class="info">${msg}</span>`;
    } else if (type === 'error') {
      el.innerHTML = `<div class="error">${msg}</div>`;
    }
  }

  function clearStatus() { document.getElementById('status').innerHTML = ''; }

  function escapeHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Export sélection ────────────────────────────────────────────────────
  function selectionFilename(ext) {
    const { day, month, startYear, endYear } = state;
    return `selection-${pad(day)}-${pad(month)}_${startYear}-${endYear}.${ext}`;
  }

  function selectionMeta() {
    const { day, month, startYear, endYear } = state;
    return {
      date: `${pad(day)}/${pad(month)}`,
      periodeDebut: startYear,
      periodeFin: endYear,
      exportedAt: new Date().toISOString().substring(0, 10),
      total: selection.size,
    };
  }

  function exportSelectionJson() {
    // Ouvre le modal titre/auteur avant de sauvegarder
    document.getElementById('sel-title').value  = '';
    document.getElementById('sel-author').value = '';
    document.getElementById('save-selection-modal').classList.remove('hidden');
    document.getElementById('sel-title').focus();
  }

  async function confirmSaveSelection() {
    const title    = document.getElementById('sel-title').value.trim()  || 'Sans titre';
    const author   = document.getElementById('sel-author').value.trim() || '';
    document.getElementById('save-selection-modal').classList.add('hidden');

    const meta     = { ...selectionMeta(), titre: title, auteur: author };
    const filename = selectionFilename('json');
    const payload  = { recherche: meta, items: selection.items };
    const json     = JSON.stringify(payload, null, 2);

    try {
      await fetch(`selections.php?action=save&file=${encodeURIComponent(filename)}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: json,
      });
      showToast(`✅ Sélection enregistrée : ${filename}`);
    } catch { /* fallback silencieux */ }
    downloadBlob(json, filename, 'application/json;charset=utf-8');
  }

  function exportSelectionCsv() {
    const meta = selectionMeta();
    const header = `# Sélection — ${meta.date} — ${meta.periodeDebut}–${meta.periodeFin} — exporté le ${meta.exportedAt}`;
    const rows = [['Nom', 'Description', 'Année', 'Wikipedia', 'Wikidata']];
    for (const it of selection.items) {
      rows.push([
        `"${(it.name || '').replace(/"/g, '""')}"`,
        `"${(it.desc || '').replace(/"/g, '""')}"`,
        it.year || '',
        it.wpUrl || '',
        it.wikidataUrl || '',
      ]);
    }
    const csv = header + '\n' + rows.map(r => r.join(',')).join('\n');
    downloadBlob(csv, selectionFilename('csv'), 'text/csv;charset=utf-8');
  }

  function exportSelectionQmd() {
    const meta = selectionMeta();
    let qmd = `---\ntitle: "Sélection — ${meta.date}"\ndate: "${meta.exportedAt}"\n`;
    qmd += `params:\n  date: "${meta.date}"\n  debut: ${meta.periodeDebut}\n  fin: ${meta.periodeFin}\n`;
    qmd += `format:\n  html:\n    toc: true\n---\n\n`;
    qmd += `*Date : **${meta.date}** · Période : **${meta.periodeDebut}–${meta.periodeFin}** · `;
    qmd += `${meta.total} personnalité${meta.total > 1 ? 's' : ''} sélectionnée${meta.total > 1 ? 's' : ''}*\n\n`;
    qmd += `| Nom | Description | Année | Wikipedia | Wikidata |\n`;
    qmd += `|-----|-------------|-------|-----------|----------|\n`;
    for (const it of selection.items) {
      const name = (it.name || '').replace(/\|/g, '\\|');
      const desc = (it.desc || '').replace(/\|/g, '\\|');
      const wp   = it.wpUrl       ? `[Wikipedia](${it.wpUrl})`     : '';
      const wd   = it.wikidataUrl ? `[Wikidata](${it.wikidataUrl})` : '';
      qmd += `| **${name}** | ${desc} | ${it.year || ''} | ${wp} | ${wd} |\n`;
    }
    downloadBlob(qmd, selectionFilename('qmd'), 'text/plain;charset=utf-8');
  }

  function exportSelectionHtml() {
    const meta = selectionMeta();
    const styles = [...document.styleSheets]
      .map(ss => { try { return [...ss.cssRules].map(r => r.cssText).join('\n'); } catch { return ''; } })
      .join('\n');
    const cards = selection.items.map(it => {
      const imgEl = document.getElementById((it.wikidataUrl.split('/').pop()) + '-img');
      const imgTag = (imgEl && imgEl.src) ? `<img src="${escapeHtml(imgEl.src)}" style="width:100%;max-height:160px;object-fit:cover;border-radius:8px;margin:0.5rem 0">` : '';
      const wp = it.wpUrl ? `<a class="card-link" href="${escapeHtml(it.wpUrl)}" target="_blank">Wikipedia →</a>` : '';
      const wd = it.wikidataUrl ? `<a class="card-link" href="${escapeHtml(it.wikidataUrl)}" target="_blank">Wikidata →</a>` : '';
      return `<div class="card"><div class="card-name">${escapeHtml(it.name || '')}</div>`
           + `${it.desc ? `<div class="card-desc">${escapeHtml(it.desc)}</div>` : ''}`
           + imgTag
           + `<div style="margin-top:auto;display:flex;gap:0.6rem;flex-wrap:wrap">${wp}${wd}</div></div>`;
    }).join('');
    const html = `<!DOCTYPE html>
<html lang="fr"><head><meta charset="UTF-8">
<title>Sélection — ${meta.date}</title>
<style>body{font-family:'Segoe UI',sans-serif;background:#0f172a;color:#e2e8f0;padding:2rem}${styles}</style>
</head><body>
<h1 style="color:#38bdf8;margin-bottom:0.5rem">Sélection — ${meta.date}</h1>
<p style="color:#94a3b8;margin-bottom:1.5rem">Période : ${meta.periodeDebut}–${meta.periodeFin} · ${meta.total} personnalité${meta.total > 1 ? 's' : ''} · exporté le ${meta.exportedAt}</p>
<div class="grid">${cards}</div>
</body></html>`;
    downloadBlob(html, selectionFilename('html'), 'text/html;charset=utf-8');
  }

  function toggleSelections() {
    const panel = document.getElementById('selections-panel');
    panel.classList.toggle('hidden');
    if (!panel.classList.contains('hidden')) loadSelectionsList();
  }

  async function loadSelectionsList() {
    const ul = document.getElementById('selections-list');
    ul.innerHTML = '<li style="color:#475569;padding:0.5rem 0.8rem;font-size:0.85rem">Chargement…</li>';
    try {
      const res  = await fetch('selections.php?action=list');
      const list = await res.json();
      if (!list.length) {
        ul.innerHTML = '<li style="color:#475569;padding:0.5rem 0.8rem;font-size:0.85rem">Aucune sélection enregistrée.</li>';
        return;
      }
      ul.innerHTML = '';
      for (const s of list) {
        const li = document.createElement('li');
        li.className = 'archive-item';
        li.innerHTML = `
          <div class="archive-item-title">📅 ${escapeHtml(s.date)} — ${s.debut}→${s.fin}</div>
          <div class="archive-item-meta">${s.total} personnalité${s.total > 1 ? 's' : ''} · enregistré le ${escapeHtml(s.saved)}</div>
          <div style="display:flex;gap:0.4rem;margin-top:0.4rem">
            <button class="btn-sel-export" onclick="event.stopPropagation();loadSelection('${escapeHtml(s.filename)}')">Charger</button>
          </div>`;
        ul.appendChild(li);
      }
    } catch (e) {
      ul.innerHTML = `<li style="color:#f87171;padding:0.5rem 0.8rem;font-size:0.85rem">Erreur : ${escapeHtml(e.message)}</li>`;
    }
  }

  async function loadSelection(filename) {
    try {
      const res  = await fetch(`selections.php?action=load&file=${encodeURIComponent(filename)}`);
      const data = await res.json();
      document.getElementById('selections-panel').classList.add('hidden');

      const meta  = data.recherche || {};
      const items = data.items     || [];

      // Affiche le titre et les métadonnées
      const titleEl = document.getElementById('selection-view-title');
      const metaEl  = document.getElementById('selection-view-meta');

      titleEl.textContent = meta.titre || `Sélection du ${meta.date || ''}`;
      metaEl.textContent  = [
        meta.auteur     ? `par ${meta.auteur}` : '',
        meta.date       ? `📅 ${meta.date}` : '',
        (meta.periodeDebut && meta.periodeFin) ? `${meta.periodeDebut}–${meta.periodeFin}` : '',
        `${items.length} personnalité${items.length > 1 ? 's' : ''}`,
        meta.exportedAt ? `enregistré le ${meta.exportedAt}` : '',
      ].filter(Boolean).join(' · ');

      // Construit les cards
      const grid = document.getElementById('selection-view-grid');
      grid.innerHTML = '';
      for (const it of items) {
        const wp = it.wpUrl       ? `<a class="card-link" href="${escapeHtml(it.wpUrl)}" target="_blank" rel="noopener">Wikipedia →</a>` : '';
        const wd = it.wikidataUrl ? `<a class="card-link" href="${escapeHtml(it.wikidataUrl)}" target="_blank" rel="noopener">Wikidata →</a>` : '';
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          <div class="card-name">${escapeHtml(it.name || '')}</div>
          ${it.desc ? `<div class="card-desc">${escapeHtml(it.desc)}</div>` : ''}
          ${it.year ? `<div class="card-date"><span>${it.year}</span></div>` : ''}
          <img id="${it.qid}-img" />
          <div style="margin-top:auto;display:flex;gap:0.6rem;flex-wrap:wrap">${wp}${wd}</div>`;
        grid.appendChild(card);
        imageRateLimiter.enqueue(it.qid,document.getElementById(it.qid + '-img'))
      }
      document.getElementById('selection-view').classList.remove('hidden');
      document.getElementById('selection-view').scrollIntoView({ behavior: 'smooth', block: 'start' });
    } catch (e) {
      showToast(`Erreur chargement : ${e.message}`);
    }
  }

  function closeSelectionView() {
    document.getElementById('selection-view').classList.add('hidden');
    document.getElementById('selection-view-grid').innerHTML = '';
  }

  // ── Utilitaires ──────────────────────────────────────────────────────────
  function downloadBlob(content, filename, type) {
    const blob = new Blob([content], { type });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = filename;
    a.click();
    URL.revokeObjectURL(a.href);
  }

  function showToast(html) {
    const t = document.createElement('div');
    t.style.cssText = 'position:fixed;bottom:1.5rem;right:1.5rem;background:#1e293b;border:1px solid #38bdf8;color:#e2e8f0;padding:0.7rem 1.2rem;border-radius:8px;font-size:0.85rem;z-index:500;max-width:320px';
    t.innerHTML = html;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 5000);
  }

  document.addEventListener('keydown', e => { if (e.key === 'Enter') search(); });

  // ── Paramètres URL ───────────────────────────────────────────────────────
  (function initFromUrl() {
    const params  = new URLSearchParams(location.search);
    const today = new Date();
    const pDay   = params.get('day')   ?? String(today.getDate());
    const pMonth = params.get('month') ?? String(today.getMonth() + 1);
    const pStart = params.get('startYear');
    const pEnd   = params.get('endYear');

    if (pDay)   { document.getElementById('day').value       = pDay;   }
    if (pMonth) { document.getElementById('month').value     = pMonth; }
    if (pStart) { document.getElementById('startYear').value = pStart; }
    if (pEnd)   { document.getElementById('endYear').value   = pEnd;   }

    if ((pDay || pMonth || pStart || pEnd) & params.size > 0) search();
  })();


  function setLegend(data, cont, color){

    const width = 900;
    const height = 100;
    const marginTop = 20;
    const marginRight = 20;
    const marginBottom = 30;
    const marginLeft = 40;
    // Declare the x (horizontal position) scale.
    const extentX = d3.extent(data, (d) => d[0]);
    const extentY = d3.extent(data, (d) => d[1].length);

    const x = d3.scaleLinear()
        .domain(extentX)
        .range([marginLeft, width - marginRight]);

    // Declare the y (vertical position) scale.
    const y = d3.scaleSymlog()
        .domain(extentY)
        .range([height - marginBottom, marginTop]);

    // Create the SVG container.
    const svg = cont.append("svg")
        .attr("width", width)
        .attr("height", height)
        .attr("viewBox", [0, 0, width, height])
        .attr("style", "max-width: 100%; height: auto;");

    // Add a rect for each bin.
    svg.append("g")
      .selectAll()
      .data(data)
      .join("rect")
        .attr("x", (d) => {
          return x(d[0]);
        })
        .attr("width", (d) => width/extentX[1])
        .attr("y", (d) => {
          return y(d[1].length);
        })
        .attr("height", (d) => {
          return y(extentY[0]) - y(d[1].length);
        })
        .attr("fill", d=>color(d[0]))
        .on("click",(e,d)=>{
          console.log(d);
        });


    // Add the x-axis and label.
    svg.append("g")
        .attr("transform", `translate(0,${height - marginBottom})`)
        .call(d3.axisBottom(x).ticks(width / 80).tickSizeOuter(0))
        .call((g) => g.append("text")
            .attr("x", width)
            .attr("y", marginBottom)
            .attr("fill", "currentColor")
            .attr("text-anchor", "end")
            .text("Nb de personne dans l'année"));

    // Add the y-axis and label, and remove the domain line.
    svg.append("g")
        .attr("transform", `translate(${marginLeft},0)`)
        .call(d3.axisLeft(y).ticks(height / 40))
        //.call((g) => g.select(".domain").remove())
        .call((g) => g.append("text")
            .attr("x", -marginLeft)
            .attr("y", 10)
            .attr("fill", "currentColor")
            .attr("text-anchor", "start")
            .text("Nombre d'année"));   
  }
